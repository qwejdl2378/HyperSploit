name: .NET Core Desktop

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install .NET 9.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    - name: Build HyperSploit
      run: dotnet publish HyperSploit.sln -c Release -r win-x64
    - uses: actions/upload-artifact@v4
      with:
        name: HyperSploit-Windows.exe
        path: bin/Release/net9.0/win-x64/publish/HyperSploit.exe
  build-linux:
    name: Linux Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install .NET 9.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    - name: Build HyperSploit
      run: dotnet publish HyperSploit.sln -c Release -r linux-x64
    - uses: actions/upload-artifact@v4
      with:
        name: HyperSploit-Linux
        path: bin/Release/net9.0/linux-x64/publish/HyperSploit
  build-macos:
    name: MacOS Build
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install .NET 9.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    - name: Build HyperSploit
      run: dotnet publish HyperSploit.sln -c Release -r osx-arm64
    - uses: actions/upload-artifact@v4
      with:
        name: HyperSploit-MacOS
        path: bin/Release/net9.0/osx-arm64/publish/HyperSploit

  release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: HyperSploit-Windows.exe
        path: ./artifacts/windows

    - name: Download Linux Artifact
      uses: actions/download-artifact@v4
      with:
        name: HyperSploit-Linux
        path: ./artifacts/linux

    - name: Download MacOS Artifact
      uses: actions/download-artifact@v4
      with:
        name: HyperSploit-MacOS
        path: ./artifacts/macos

    - name: Prepare Release Files
      run: |
        mkdir -p ./release-assets
        cp ./artifacts/windows/HyperSploit.exe ./release-assets/HyperSploit-Windows.exe
        cp ./artifacts/linux/HyperSploit ./release-assets/HyperSploit-Linux
        cp ./artifacts/macos/HyperSploit ./release-assets/HyperSploit-MacOS
        chmod +x ./release-assets/HyperSploit-Linux
        chmod +x ./release-assets/HyperSploit-MacOS

    - name: Upload to Release
      uses: marvinpinto/action-automatic-releases@latest
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        automatic_release_tag: "latest"
        prerelease: true
        title: "Latest Development Build"
        files: |
          ./release-assets/HyperSploit-Windows.exe
          ./release-assets/HyperSploit-Linux
          ./release-assets/HyperSploit-MacOS
